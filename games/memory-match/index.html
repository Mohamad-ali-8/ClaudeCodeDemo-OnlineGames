<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Memory Match — Offline Game Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a1a1a;color:#e8e6f0;font-family:'Orbitron',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:16px}
    a.back{color:#5DCAA5;text-decoration:none;font-size:.8rem;margin-bottom:12px;align-self:flex-start;padding:6px 12px;border:1px solid #5DCAA5;border-radius:6px;transition:background .15s}
    a.back:hover{background:#5DCAA5;color:#0a1a1a}
    h1{font-size:1.4rem;letter-spacing:.1em;margin-bottom:12px}
    #stats{display:flex;gap:20px;margin-bottom:14px;font-size:.8rem}
    #stats span{color:#888}
    #stats b{color:#5DCAA5}
    #grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:min(460px,96vw)}
    .card{perspective:600px;width:100%;aspect-ratio:1;cursor:pointer}
    .card-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .4s ease;border-radius:10px}
    .card.flipped .card-inner,.card.matched .card-inner{transform:rotateY(180deg)}
    .card-front,.card-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:10px;display:flex;align-items:center;justify-content:center}
    .card-back{background:linear-gradient(135deg,#5DCAA5 0%,#1a6a55 100%);border:2px solid #5DCAA5}
    .card-back::after{content:'✦';font-size:1.8rem;color:rgba(255,255,255,.3)}
    .card-front{background:#12302a;border:2px solid #1a5a48;transform:rotateY(180deg);font-size:min(2.8rem,9vw)}
    .card.matched .card-front{border-color:#5DCAA5;box-shadow:0 0 12px rgba(93,202,165,.4)}
    .card.shake .card-inner{animation:shake .4s ease}
    @keyframes shake{0%,100%{transform:rotateY(180deg)}25%{transform:rotateY(180deg) translateX(-4px)}75%{transform:rotateY(180deg) translateX(4px)}}
    /* Win overlay */
    #win-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:10;align-items:center;justify-content:center}
    #win-overlay.show{display:flex}
    #win-box{background:#12302a;border:2px solid #5DCAA5;border-radius:20px;padding:36px;text-align:center;max-width:320px;box-shadow:0 0 60px rgba(93,202,165,.3)}
    #win-box h2{color:#5DCAA5;font-size:1.6rem;margin-bottom:8px}
    #win-stats{color:#888;font-family:sans-serif;font-size:.9rem;margin-bottom:12px;line-height:1.6}
    #stars{font-size:2rem;margin:8px 0 16px;letter-spacing:4px}
    #btn-again{padding:10px 28px;background:#5DCAA5;color:#0a1a1a;border:none;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:.85rem;cursor:pointer;transition:background .15s}
    #btn-again:hover{background:#7adcba}
  </style>
</head>
<body>
<a class="back" href="../../index.html">← Back to Menu</a>
<h1>Memory Match</h1>
<div id="stats">
  <span>Moves: <b id="moves">0</b></span>
  <span>Time: <b id="timer">0:00</b></span>
  <span>Pairs: <b id="pairs">0</b>/8</span>
</div>
<div id="grid"></div>

<div id="win-overlay">
  <div id="win-box">
    <h2>You Won! 🎉</h2>
    <div id="win-stats"></div>
    <div id="stars"></div>
    <button id="btn-again">Play Again</button>
  </div>
</div>

<script>
'use strict';
const SYMBOLS=['🌙','⭐','🔥','💎','🎵','🎯','🚀','🌈'];
let cards,flipped,matched,moves,seconds,timerInt,canFlip;

function pad2(n){return String(n).padStart(2,'0');}
function fmtTime(s){return Math.floor(s/60)+':'+pad2(s%60);}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function startGame(){
  cards=shuffle([...SYMBOLS,...SYMBOLS]);
  flipped=[];matched=new Set();moves=0;seconds=0;canFlip=true;
  clearInterval(timerInt);
  document.getElementById('moves').textContent='0';
  document.getElementById('timer').textContent='0:00';
  document.getElementById('pairs').textContent='0';
  document.getElementById('win-overlay').classList.remove('show');
  renderGrid();
}

function renderGrid(){
  const g=document.getElementById('grid');
  g.innerHTML='';
  cards.forEach((sym,i)=>{
    const card=document.createElement('div');
    card.className='card';
    card.dataset.i=i;
    card.innerHTML=`<div class="card-inner"><div class="card-back"></div><div class="card-front">${sym}</div></div>`;
    card.addEventListener('click',()=>flipCard(i));
    g.appendChild(card);
  });
}

function getCardEl(i){return document.querySelector(`.card[data-i="${i}"]`);}

function flipCard(i){
  if(!canFlip) return;
  if(matched.has(i)) return;
  if(flipped.includes(i)) return;
  if(flipped.length>=2) return;

  // Start timer on first flip
  if(flipped.length===0&&matched.size===0&&moves===0){
    timerInt=setInterval(()=>{seconds++;document.getElementById('timer').textContent=fmtTime(seconds);},1000);
  }

  flipped.push(i);
  getCardEl(i).classList.add('flipped');

  if(flipped.length===2){
    canFlip=false;moves++;
    document.getElementById('moves').textContent=moves;
    const [a,b]=flipped;
    if(cards[a]===cards[b]){
      // Match!
      setTimeout(()=>{
        matched.add(a);matched.add(b);
        getCardEl(a).classList.add('matched');
        getCardEl(b).classList.add('matched');
        flipped=[];canFlip=true;
        document.getElementById('pairs').textContent=matched.size/2;
        if(matched.size===16) winGame();
      },400);
    } else {
      // No match — shake and flip back
      setTimeout(()=>{
        getCardEl(a).classList.add('shake');
        getCardEl(b).classList.add('shake');
      },300);
      setTimeout(()=>{
        getCardEl(a).classList.remove('flipped','shake');
        getCardEl(b).classList.remove('flipped','shake');
        flipped=[];canFlip=true;
      },900);
    }
  }
}

function winGame(){
  clearInterval(timerInt);
  const stars=moves<=12?3:moves<=18?2:1;
  document.getElementById('win-stats').innerHTML=
    `Time: <b>${fmtTime(seconds)}</b><br>Moves: <b>${moves}</b>`;
  document.getElementById('stars').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('win-overlay').classList.add('show');
}

document.getElementById('btn-again').onclick=startGame;
startGame();
</script>
</body>
</html>
