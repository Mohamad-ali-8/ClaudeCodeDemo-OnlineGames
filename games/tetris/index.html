<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tetris — Offline Game Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0a1a;color:#e8e6f0;font-family:'Orbitron',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:16px}
    a.back{color:#1D9E75;text-decoration:none;font-size:.8rem;letter-spacing:.05em;margin-bottom:12px;align-self:flex-start;padding:6px 12px;border:1px solid #1D9E75;border-radius:6px;transition:background .15s}
    a.back:hover{background:#1D9E75;color:#0a0a1a}
    h1{font-size:1.4rem;margin-bottom:12px;letter-spacing:.1em}
    #game-wrap{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;justify-content:center}
    canvas{border:2px solid #534AB7;display:block;box-shadow:0 0 20px rgba(83,74,183,.3)}
    #side{display:flex;flex-direction:column;gap:12px;width:140px}
    .box{background:#12122a;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px}
    .box h3{font-size:.65rem;letter-spacing:.12em;color:#666;margin-bottom:6px;text-transform:uppercase}
    .val{font-size:1.1rem;color:#EF9F27;font-weight:700}
    #next-canvas{display:block;margin:0 auto}
    #btn-new,#btn-pause{width:100%;padding:9px;border:none;border-radius:7px;font-family:'Orbitron',sans-serif;font-size:.72rem;cursor:pointer;letter-spacing:.04em;transition:background .15s}
    #btn-new{background:#534AB7;color:white;margin-bottom:6px}
    #btn-new:hover{background:#6a5fd4}
    #btn-pause{background:#12122a;color:#888;border:1px solid #333}
    #btn-pause:hover{background:#1a1a3a}
    .ctrl{font-size:.6rem;color:#555;line-height:1.9;font-family:monospace}
    /* Overlay */
    #overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:10;align-items:center;justify-content:center}
    #overlay.show{display:flex}
    #overlay-box{background:#12122a;border:2px solid #534AB7;border-radius:16px;padding:32px;text-align:center;max-width:300px}
    #overlay-box h2{color:#534AB7;margin-bottom:8px}
    #overlay-box p{color:#888;font-family:sans-serif;margin-bottom:16px}
    .score-display{font-size:2rem;color:#EF9F27;margin:8px 0}
    #overlay-btn{padding:10px 24px;background:#534AB7;color:white;border:none;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:.8rem;cursor:pointer}
    /* Mobile controls */
    #mobile-ctrl{display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:10px}
    .mrow{display:flex;gap:6px}
    .mbtn{width:52px;height:52px;background:#12122a;border:1px solid #534AB7;border-radius:8px;color:#534AB7;font-size:1.3rem;cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:center;transition:background .1s}
    .mbtn:active,.mbtn:hover{background:#534AB7;color:white}
  </style>
</head>
<body>
<a class="back" href="../../index.html">← Back to Menu</a>
<h1>Tetris</h1>
<div id="game-wrap">
  <canvas id="c" width="300" height="600"></canvas>
  <div id="side">
    <div class="box"><h3>Score</h3><div class="val" id="score">0</div></div>
    <div class="box"><h3>Best</h3><div class="val" id="best">0</div></div>
    <div class="box"><h3>Level</h3><div class="val" id="level">1</div></div>
    <div class="box"><h3>Lines</h3><div class="val" id="lines">0</div></div>
    <div class="box"><h3>Next</h3><canvas id="next-canvas" width="100" height="100"></canvas></div>
    <button id="btn-new">New Game</button>
    <button id="btn-pause">Pause [P]</button>
    <div class="box ctrl">
      ←→ Move<br>
      ↑/X Rotate CW<br>
      Z Rotate CCW<br>
      ↓ Soft drop<br>
      Space Hard drop<br>
      P Pause
    </div>
  </div>
</div>
<div id="mobile-ctrl">
  <div class="mrow"><button class="mbtn" id="m-rot">↻</button></div>
  <div class="mrow">
    <button class="mbtn" id="m-left">◀</button>
    <button class="mbtn" id="m-down">▼</button>
    <button class="mbtn" id="m-right">▶</button>
  </div>
  <div class="mrow"><button class="mbtn" id="m-drop">⬇</button></div>
</div>

<div id="overlay">
  <div id="overlay-box">
    <h2 id="ov-title">Tetris</h2>
    <p id="ov-msg">Press any key or click to start</p>
    <div class="score-display" id="ov-score" style="display:none"></div>
    <button id="overlay-btn">▶ Play</button>
  </div>
</div>

<script>
'use strict';
const C=30; // cell size
const COLS=10,ROWS=20;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const nctx=document.getElementById('next-canvas').getContext('2d');
const HS='tetris_highscore';

const SHAPES={
  I:{cells:[[0,1],[1,1],[2,1],[3,1]],color:'#00f0f0'},
  O:{cells:[[0,0],[1,0],[0,1],[1,1]],color:'#f0f000'},
  T:{cells:[[0,1],[1,1],[2,1],[1,0]],color:'#a000f0'},
  S:{cells:[[1,0],[2,0],[0,1],[1,1]],color:'#00f000'},
  Z:{cells:[[0,0],[1,0],[1,1],[2,1]],color:'#f00000'},
  J:{cells:[[0,0],[0,1],[1,1],[2,1]],color:'#0000f0'},
  L:{cells:[[2,0],[0,1],[1,1],[2,1]],color:'#f0a000'}
};
const KEYS=Object.keys(SHAPES);

// SRS wall kicks for J,L,S,T,Z
const KICKS={
  '0>1':[[-1,0],[-1,1],[0,-2],[-1,-2]],
  '1>0':[[1,0],[1,-1],[0,2],[1,2]],
  '1>2':[[1,0],[1,-1],[0,2],[1,2]],
  '2>1':[[-1,0],[-1,1],[0,-2],[-1,-2]],
  '2>3':[[1,0],[1,1],[0,-2],[1,-2]],
  '3>2':[[-1,0],[-1,-1],[0,2],[-1,2]],
  '3>0':[[-1,0],[-1,-1],[0,2],[-1,2]],
  '0>3':[[1,0],[1,1],[0,-2],[1,-2]]
};
const KICKS_I={
  '0>1':[[-2,0],[1,0],[-2,-1],[1,2]],
  '1>0':[[2,0],[-1,0],[2,1],[-1,-2]],
  '1>2':[[-1,0],[2,0],[-1,2],[2,-1]],
  '2>1':[[1,0],[-2,0],[1,-2],[-2,1]],
  '2>3':[[2,0],[-1,0],[2,1],[-1,-2]],
  '3>2':[[-2,0],[1,0],[-2,-1],[1,2]],
  '3>0':[[1,0],[-2,0],[1,-2],[-2,1]],
  '0>3':[[-1,0],[2,0],[-1,2],[2,-1]]
};

let board,current,next,score,level,lines,gameRunning,paused,loopTimer;
let lockTimer=null;

function getBest(){return parseInt(localStorage.getItem(HS)||'0')}
function setBest(s){if(s>getBest())localStorage.setItem(HS,s)}
document.getElementById('best').textContent=getBest();

function randPiece(){
  const k=KEYS[Math.floor(Math.random()*KEYS.length)];
  const s=SHAPES[k];
  return {type:k,cells:s.cells.map(c=>[...c]),color:s.color,rotation:0,x:3,y:0};
}
function rotateCells(cells){return cells.map(([x,y])=>[-y,x]);}
function normalizeCells(cells){
  const minX=Math.min(...cells.map(c=>c[0]));
  const minY=Math.min(...cells.map(c=>c[1]));
  return cells.map(([x,y])=>[x-minX,y-minY]);
}
function rotatedCells(p,dir){
  let c=p.cells.map(cc=>[...cc]);
  const times=((dir%4)+4)%4;
  for(let i=0;i<times;i++) c=rotateCells(c);
  return c;
}

function valid(cells,ox,oy){
  return cells.every(([cx,cy])=>{
    const nx=cx+ox,ny=cy+oy;
    return nx>=0&&nx<COLS&&ny>=0&&ny<ROWS&&(ny<0||!board[ny][nx]);
  });
}

function startGame(){
  board=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  score=0;level=1;lines=0;
  current=randPiece();
  next=randPiece();
  gameRunning=true;paused=false;
  document.getElementById('score').textContent='0';
  document.getElementById('level').textContent='1';
  document.getElementById('lines').textContent='0';
  document.getElementById('best').textContent=getBest();
  document.getElementById('overlay').classList.remove('show');
  clearInterval(loopTimer);
  loopTimer=setInterval(drop,speed());
  draw();
}

function speed(){return Math.max(100,800-100*(level-1));}

function drop(){
  if(!gameRunning||paused) return;
  if(valid(current.cells,current.x,current.y+1)){
    current.y++;
  } else {
    lock();
  }
  draw();
}

function lock(){
  current.cells.forEach(([cx,cy])=>{
    const fy=cy+current.y;
    if(fy>=0) board[fy][cx+current.x]=current.color;
  });
  clearLines();
  current=next;next=randPiece();
  if(!valid(current.cells,current.x,current.y)){
    gameOver();return;
  }
  draw();
}

function clearLines(){
  let cleared=0;
  for(let r=ROWS-1;r>=0;r--){
    if(board[r].every(c=>c!==null)){
      board.splice(r,1);
      board.unshift(Array(COLS).fill(null));
      cleared++;r++;
    }
  }
  if(cleared>0){
    const pts=[0,100,300,500,800][cleared]*level;
    score+=pts;lines+=cleared;
    const newLevel=Math.floor(lines/10)+1;
    if(newLevel>level){level=newLevel;clearInterval(loopTimer);loopTimer=setInterval(drop,speed());}
    document.getElementById('score').textContent=score;
    document.getElementById('level').textContent=level;
    document.getElementById('lines').textContent=lines;
  }
}

function gameOver(){
  clearInterval(loopTimer);gameRunning=false;
  setBest(score);
  document.getElementById('best').textContent=getBest();
  const ov=document.getElementById('overlay');ov.classList.add('show');
  document.getElementById('ov-title').textContent='Game Over';
  document.getElementById('ov-msg').textContent='Score';
  const sv=document.getElementById('ov-score');sv.textContent=score;sv.style.display='';
  document.getElementById('overlay-btn').textContent='▶ Play Again';
}

function ghostY(){
  let gy=current.y;
  while(valid(current.cells,current.x,gy+1)) gy++;
  return gy;
}

function draw(){
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,300,600);
  // Grid lines
  ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=0.5;
  for(let i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(i*C,0);ctx.lineTo(i*C,600);ctx.stroke();}
  for(let j=0;j<=ROWS;j++){ctx.beginPath();ctx.moveTo(0,j*C);ctx.lineTo(300,j*C);ctx.stroke();}
  // Board
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(board[r][c]) drawCell(ctx,c,r,board[r][c]);
  // Ghost
  if(gameRunning&&!paused){
    const gy=ghostY();
    current.cells.forEach(([cx,cy])=>{
      const fx=cx+current.x,fy=cy+gy;
      if(fy>=0){ctx.strokeStyle=current.color;ctx.lineWidth=1.5;ctx.strokeRect(fx*C+1,fy*C+1,C-2,C-2);}
    });
    // Current piece
    current.cells.forEach(([cx,cy])=>{drawCell(ctx,cx+current.x,cy+current.y,current.color);});
  }
  // Next
  nctx.fillStyle='#12122a';nctx.fillRect(0,0,100,100);
  const nc=SHAPES[next.type].cells;
  const minX=Math.min(...nc.map(c=>c[0])),maxX=Math.max(...nc.map(c=>c[0]));
  const minY=Math.min(...nc.map(c=>c[1])),maxY=Math.max(...nc.map(c=>c[1]));
  const offX=Math.floor((4-(maxX-minX+1))/2)-minX;
  const offY=Math.floor((4-(maxY-minY+1))/2)-minY;
  nc.forEach(([cx,cy])=>{
    const x=(cx+offX)*22+6,y=(cy+offY)*22+6;
    nctx.fillStyle=next.color;nctx.fillRect(x+1,y+1,20,20);
    nctx.fillStyle='rgba(255,255,255,.2)';nctx.fillRect(x+2,y+2,6,3);
  });
  if(paused){ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,300,600);ctx.fillStyle='white';ctx.font='bold 20px Orbitron';ctx.textAlign='center';ctx.fillText('PAUSED',150,300);}
}

function drawCell(ctx,x,y,color){
  ctx.fillStyle=color;ctx.fillRect(x*C+1,y*C+1,C-2,C-2);
  ctx.fillStyle='rgba(255,255,255,.25)';ctx.fillRect(x*C+2,y*C+2,C-4,4);
  ctx.fillStyle='rgba(0,0,0,.2)';ctx.fillRect(x*C+1,y*C+C-4,C-2,3);
}

function move(dx){
  if(!gameRunning||paused) return;
  if(valid(current.cells,current.x+dx,current.y)) current.x+=dx;
  draw();
}

function rotate(dir){
  if(!gameRunning||paused) return;
  const newRot=(current.rotation+dir+4)%4;
  const oldCells=current.cells.map(c=>[...c]);
  const newCells=rotatedCells({cells:SHAPES[current.type].cells,rotation:0},newRot);
  const normNew=normalizeCells(newCells);
  const key=`${current.rotation}>${newRot}`;
  const kicks=current.type==='I'?(KICKS_I[key]||[[0,0]]):([[0,0],...(KICKS[key]||[])]);
  for(const [kx,ky] of kicks){
    if(valid(normNew,current.x+kx,current.y+ky)){
      current.cells=normNew;current.rotation=newRot;current.x+=kx;current.y+=ky;
      draw();return;
    }
  }
}

function hardDrop(){
  if(!gameRunning||paused) return;
  current.y=ghostY();lock();draw();
}

function softDrop(){
  if(!gameRunning||paused) return;
  if(valid(current.cells,current.x,current.y+1)){current.y++;score+=1;document.getElementById('score').textContent=score;}
  draw();
}

document.addEventListener('keydown',e=>{
  if(!gameRunning&&(e.key==='Enter'||e.key===' ')){startGame();return;}
  switch(e.key){
    case 'ArrowLeft':case 'a':case 'A':e.preventDefault();move(-1);break;
    case 'ArrowRight':case 'd':case 'D':e.preventDefault();move(1);break;
    case 'ArrowDown':case 's':case 'S':e.preventDefault();softDrop();break;
    case 'ArrowUp':case 'x':case 'X':e.preventDefault();rotate(1);break;
    case 'z':case 'Z':e.preventDefault();rotate(-1);break;
    case ' ':e.preventDefault();hardDrop();break;
    case 'p':case 'P':if(gameRunning){paused=!paused;document.getElementById('btn-pause').textContent=paused?'Resume [P]':'Pause [P]';draw();}break;
  }
});

document.getElementById('btn-new').onclick=startGame;
document.getElementById('btn-pause').onclick=()=>{if(gameRunning){paused=!paused;document.getElementById('btn-pause').textContent=paused?'Resume [P]':'Pause [P]';draw();}};
document.getElementById('overlay-btn').onclick=startGame;
document.getElementById('m-left').onclick=()=>move(-1);
document.getElementById('m-right').onclick=()=>move(1);
document.getElementById('m-down').onclick=softDrop;
document.getElementById('m-rot').onclick=()=>rotate(1);
document.getElementById('m-drop').onclick=hardDrop;

// Show start overlay
document.getElementById('overlay').classList.add('show');
document.getElementById('ov-title').textContent='Tetris';
document.getElementById('ov-msg').textContent='Press any key or click to start';
document.getElementById('ov-score').style.display='none';
document.getElementById('overlay-btn').textContent='▶ Play';
ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,300,600);
</script>
</body>
</html>
