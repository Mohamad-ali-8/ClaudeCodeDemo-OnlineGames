<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pong — Offline Game Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#000;color:#D3D1C7;font-family:'Orbitron',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:16px}
    a.back{color:#D3D1C7;text-decoration:none;font-size:.8rem;margin-bottom:12px;align-self:flex-start;padding:6px 12px;border:1px solid #D3D1C7;border-radius:6px;transition:background .15s}
    a.back:hover{background:#D3D1C7;color:#000}
    h1{font-size:1.4rem;letter-spacing:.1em;margin-bottom:12px}
    #mode-screen{display:flex;flex-direction:column;align-items:center;gap:14px;padding:40px 20px}
    #mode-screen h2{font-size:1.1rem;letter-spacing:.1em;color:#888}
    .mode-btn{padding:14px 40px;border:2px solid #D3D1C7;border-radius:10px;background:transparent;color:#D3D1C7;font-family:'Orbitron',sans-serif;font-size:.9rem;cursor:pointer;transition:background .15s,color .15s;letter-spacing:.05em}
    .mode-btn:hover{background:#D3D1C7;color:#000}
    #game-area{display:none;flex-direction:column;align-items:center;gap:8px}
    canvas{border:2px solid #333;display:block}
    #controls-hint{font-size:.65rem;color:#555;text-align:center;letter-spacing:.05em}
    /* Overlay */
    #overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,.85);align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:10}
    #overlay.show{display:flex}
    #ov-wrap{position:relative}
    #ov-box{text-align:center}
    #ov-winner{font-size:1.6rem;color:#D3D1C7;margin-bottom:8px}
    #ov-score-big{font-size:1.1rem;color:#888;margin-bottom:16px}
    .ov-btn{padding:10px 24px;background:transparent;border:2px solid #D3D1C7;border-radius:8px;color:#D3D1C7;font-family:'Orbitron',sans-serif;font-size:.8rem;cursor:pointer;margin:4px;transition:background .15s}
    .ov-btn:hover{background:#D3D1C7;color:#000}
    /* Touch zones */
    #touch-zones{display:none;width:100%;max-width:600px;height:80px;display:flex;gap:8px;margin-top:4px}
    .touch-zone{flex:1;background:#111;border:1px solid #333;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:#555;font-size:.65rem;letter-spacing:.05em;user-select:none;touch-action:none}
    .touch-up,.touch-down{width:100%;flex:1;display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:#444;cursor:pointer;transition:background .1s}
    .touch-up:active,.touch-down:active{background:rgba(255,255,255,.05)}
  </style>
</head>
<body>
<a class="back" href="../../index.html">← Back to Menu</a>
<h1>Pong</h1>

<div id="mode-screen">
  <h2>Select Mode</h2>
  <button class="mode-btn" id="btn-2p">👥 2 Players</button>
  <button class="mode-btn" id="btn-ai">🤖 vs AI</button>
</div>

<div id="game-area">
  <div id="ov-wrap" style="position:relative">
    <canvas id="c"></canvas>
    <div id="overlay">
      <div id="ov-box">
        <div id="ov-winner"></div>
        <div id="ov-score-big"></div>
        <button class="ov-btn" id="btn-restart">▶ Play Again</button>
        <button class="ov-btn" id="btn-menu">↩ Menu</button>
      </div>
    </div>
  </div>
  <div id="controls-hint"></div>
  <div id="touch-zones">
    <div class="touch-zone" id="tz-left">
      <div class="touch-up" id="tz-l-up">▲</div>
      <span>P1</span>
      <div class="touch-down" id="tz-l-down">▼</div>
    </div>
    <div class="touch-zone" id="tz-right">
      <div class="touch-up" id="tz-r-up">▲</div>
      <span id="tz-r-label">P2</span>
      <div class="touch-down" id="tz-r-down">▼</div>
    </div>
  </div>
</div>

<script>
'use strict';
const W=600,H=400,PAD_W=12,PAD_H=80,BALL_SZ=10,WIN_SCORE=7;
const canvas=document.getElementById('c');
canvas.width=W;canvas.height=H;
const ctx=canvas.getContext('2d');

let mode,p1,p2,ball,score,running,paused,raf;
const keys={};

function initGame(m){
  mode=m;
  p1={y:H/2-PAD_H/2,vy:0,speed:6};
  p2={y:H/2-PAD_H/2,vy:0,speed:m==='ai'?4:6};
  score={p1:0,p2:0};
  resetBall(1);
  running=true;paused=false;
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('mode-screen').style.display='none';
  document.getElementById('game-area').style.display='flex';
  document.getElementById('controls-hint').textContent=
    m==='2p'?'P1: W/S  —  P2: ↑/↓  —  ESC: Pause':'P1: W/S or ↑/↓  —  ESC: Pause';
  document.getElementById('tz-r-label').textContent=m==='ai'?'AI':'P2';
  cancelAnimationFrame(raf);
  loop();
}

function resetBall(dir){
  const ang=(Math.random()*0.6-0.3)+(dir===1?0:Math.PI);
  const spd=5;
  ball={x:W/2,y:H/2,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,speed:spd};
}

function loop(){
  if(running){update();draw();}
  raf=requestAnimationFrame(loop);
}

function update(){
  if(paused) return;
  // P1 movement
  if(keys['w']||keys['W']||keys['ArrowUp']&&mode==='2p') p1.y=Math.max(0,p1.y-p1.speed);
  if(keys['s']||keys['S']||keys['ArrowDown']&&mode==='2p') p1.y=Math.min(H-PAD_H,p1.y+p1.speed);
  if(mode==='2p'){
    if(keys['ArrowUp']) p2.y=Math.max(0,p2.y-p2.speed);
    if(keys['ArrowDown']) p2.y=Math.min(H-PAD_H,p2.y+p2.speed);
  } else {
    // AI
    const center=p2.y+PAD_H/2;
    if(ball.x>W/2){
      if(center<ball.y-5) p2.y=Math.min(H-PAD_H,p2.y+p2.speed);
      else if(center>ball.y+5) p2.y=Math.max(0,p2.y-p2.speed);
    }
  }
  // Ball move
  ball.x+=ball.vx;ball.y+=ball.vy;
  // Wall bounce
  if(ball.y<=0){ball.y=0;ball.vy=Math.abs(ball.vy);}
  if(ball.y>=H-BALL_SZ){ball.y=H-BALL_SZ;ball.vy=-Math.abs(ball.vy);}
  // P1 paddle collision
  if(ball.vx<0&&ball.x<=20+PAD_W&&ball.x>=16&&ball.y+BALL_SZ>=p1.y&&ball.y<=p1.y+PAD_H){
    ball.x=20+PAD_W;
    const rel=(ball.y+BALL_SZ/2-p1.y)/PAD_H;
    const ang=(rel-0.5)*Math.PI*0.75;
    ball.speed=Math.min(14,ball.speed+0.3);
    ball.vx=Math.abs(Math.cos(ang)*ball.speed);
    ball.vy=Math.sin(ang)*ball.speed;
  }
  // P2 paddle collision
  if(ball.vx>0&&ball.x+BALL_SZ>=W-20-PAD_W&&ball.x+BALL_SZ<=W-16&&ball.y+BALL_SZ>=p2.y&&ball.y<=p2.y+PAD_H){
    ball.x=W-20-PAD_W-BALL_SZ;
    const rel=(ball.y+BALL_SZ/2-p2.y)/PAD_H;
    const ang=(rel-0.5)*Math.PI*0.75;
    ball.speed=Math.min(14,ball.speed+0.3);
    ball.vx=-Math.abs(Math.cos(ang)*ball.speed);
    ball.vy=Math.sin(ang)*ball.speed;
  }
  // Scoring
  if(ball.x<0){score.p2++;checkWin()||resetBall(-1);}
  if(ball.x>W){score.p1++;checkWin()||resetBall(1);}
}

function checkWin(){
  if(score.p1>=WIN_SCORE||score.p2>=WIN_SCORE){
    running=false;
    document.getElementById('ov-winner').textContent=(score.p1>=WIN_SCORE?'Player 1':(mode==='ai'?'AI':'Player 2'))+' Wins!';
    document.getElementById('ov-score-big').textContent=score.p1+' — '+score.p2;
    document.getElementById('overlay').classList.add('show');
    return true;
  }
  return false;
}

function draw(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  // Center line
  ctx.setLineDash([8,8]);ctx.strokeStyle='rgba(211,209,199,.3)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();
  ctx.setLineDash([]);
  // Score
  ctx.fillStyle='rgba(211,209,199,.8)';ctx.font='bold 42px Orbitron';ctx.textAlign='center';
  ctx.fillText(score.p1,W/2-70,56);ctx.fillText(score.p2,W/2+70,56);
  // Paddles
  ctx.fillStyle='#D3D1C7';
  ctx.beginPath();ctx.roundRect(20,p1.y,PAD_W,PAD_H,4);ctx.fill();
  ctx.beginPath();ctx.roundRect(W-20-PAD_W,p2.y,PAD_W,PAD_H,4);ctx.fill();
  // Ball
  if(running||paused){
    ctx.fillStyle='#D3D1C7';
    ctx.beginPath();ctx.roundRect(ball.x,ball.y,BALL_SZ,BALL_SZ,2);ctx.fill();
  }
  if(paused){
    ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#D3D1C7';ctx.font='28px Orbitron';ctx.textAlign='center';
    ctx.fillText('PAUSED',W/2,H/2);
    ctx.font='14px Orbitron';ctx.fillStyle='#666';
    ctx.fillText('Press ESC to resume',W/2,H/2+30);
  }
}

document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key==='Escape'&&running!==undefined){
    paused=!paused;
  }
  if(e.key===' ') e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

// Touch controls
function holdDir(id,val){
  let iv;
  const start=()=>{keys[id]=val;iv=setInterval(()=>{},50);};
  const stop=()=>{keys[id]=false;clearInterval(iv);};
  const el=document.getElementById(id);
  el.addEventListener('touchstart',start,{passive:true});
  el.addEventListener('touchend',stop,{passive:true});
  el.addEventListener('mousedown',start);
  document.addEventListener('mouseup',stop);
}
holdDir('tz-l-up','w');holdDir('tz-l-down','s');
holdDir('tz-r-up','ArrowUp');holdDir('tz-r-down','ArrowDown');

document.getElementById('btn-2p').onclick=()=>initGame('2p');
document.getElementById('btn-ai').onclick=()=>initGame('ai');
document.getElementById('btn-restart').onclick=()=>initGame(mode);
document.getElementById('btn-menu').onclick=()=>{
  cancelAnimationFrame(raf);running=false;
  document.getElementById('game-area').style.display='none';
  document.getElementById('mode-screen').style.display='flex';
  document.getElementById('overlay').classList.remove('show');
};
</script>
</body>
</html>
